[options]
focus_follows_mouse = true
horizontal_mouse_warp = -1

[bindings]
window_focus_west = "alt - h"
window_focus_east = "alt - l"
window_focus_north = "alt - k"
window_focus_south = "alt - j"
window_swap_west = "alt + shift - h"
window_swap_east = "alt + shift - l"
window_swap_north = "alt + shift - k"
window_swap_south = "alt + shift - j"
window_manage = "alt - f"
window_fullwidth = "alt - g"
window_center = "alt - c"
window_stack = "alt - ["
window_unstack = "alt - ]"
window_nextdisplay = "alt + shift - tab"
window_resize = "alt - r"
window_snap = "alt - p"
window_virtual_north = "alt - i"
window_virtual_south = "alt - o"
window_virtualmove_north = "alt + shift - i"
window_virtualmove_south = "alt + shift - o"

[swipe.scroll]
modifier = "alt"

[decorations.inactive.dim]
opacity = 0.3
color = "#000000"
