[options]
focus_follows_mouse = true
mouse_follows_focus = false
horizontal_mouse_warp = -1
animation_speed = 25
preset_column_widths = [0.30, 0.50, 0.70]
reap_empty_workspaces = true

[bindings]
window_focus_west = "alt - h"
window_focus_east = "alt - l"
window_focus_north = "alt - k"
window_focus_south = "alt - j"
window_swap_west = "alt + shift - h"
window_swap_east = "alt + shift - l"
window_swap_north = "alt + shift - k"
window_swap_south = "alt + shift - j"
window_manage = "alt - f"
window_fullwidth = "alt - g"
window_center = "alt - c"
window_stack = "alt - ["
window_unstack = "alt - ]"
window_nextdisplay = "alt + shift - tab"
window_resize = "alt - r"
window_togglefloatlayer = "alt - p"
window_virtual_north = "alt - u"
window_virtual_south = "alt - i"
window_virtualmove_north = "alt + shift - u"
window_virtualmove_south = "alt + shift - i"


[swipe.scroll]
modifier = "alt"

