# Resolve the config directory once so local helper paths stay relocatable.
set -gF @config_dir "#{HOME}/.config/tmux"

# ---- Plugins ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Catppuccin (Latte) status theme + modules.
set -g @catppuccin_flavor 'latte'
set -g @catppuccin_status_background 'default'            # transparent — blends with term bg
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'left'
set -g @catppuccin_window_default_text ' #{=20:window_name}'
set -g @catppuccin_window_current_text ' #{=20:window_name}#{?window_zoomed_flag,  ,}'
set -g @plugin 'catppuccin/tmux#v2.1.2'

# RAM source (tmux-cpu exposes #{ram_percentage}; catppuccin ram module reads it).
set -g @plugin 'tmux-plugins/tmux-cpu'

# Window names: tmux-window-name plugin (smart rename).
set -g @plugin 'ofirgall/tmux-window-name'
set -g @tmux_window_name_shells "['zsh', 'bash', 'fish', 'sh']"
set -g @tmux_window_name_show_program_args 'False'
set -g @tmux_window_name_max_name_len '20'
set -g @tmux_window_name_use_tilde 'True'

# tmux-which-key: C-Space opens a which-key menu; all actions routed through it.
# Config lives at ~/.config/tmux/plugins/tmux-which-key/config.yaml
# (gitignored by the plugin, so TPM updates won't clobber it).
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'Ataraxy-Labs/opensessions'

# Seamless Ctrl-hjkl nav between tmux panes and nvim splits.
set -g @plugin 'christoomey/vim-tmux-navigator'

# extrakto: the only picker. Fzf over paths, URLs, words, and lines in the
# visible pane buffer.
set -g @plugin 'laktak/extrakto'
set -g @extrakto_key 'none'                  # prefix is disabled — bind via which-key
set -g @extrakto_filter_order 'all url path word line'
set -g @extrakto_clip_tool '$HOME/.config/tmux/bin/copy.sh'

# treemux: nvim-tree sidebar inside a tmux pane.
# Deps: nvim, pynvim (installed in ~/.local/share/treemux-venv), lsof.
# Bindings routed via which-key (bin/treemux-toggle.sh) since prefix is disabled.
set -gF @treemux-python-command "#{@config_dir}/bin/treemux-python.sh"
set -g @treemux-tree-width '10'
set -g @treemux-tree-position 'left'
# Use treemux's bundled init so nvim-tree + deps bootstrap via lazy.nvim,
# independent of the user's normal nvim config.
set -gF @treemux-tree-nvim-init-file "#{@config_dir}/treemux-init.lua"
set -g @plugin 'kiyoon/treemux'

# Floating scratch terminal (proper toggle via separate popup session).
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 'none'                     # route via which-key
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#1e66f5'
set -g @floax-text-color  '#4c4f69'
set -g @floax-session-name 'scratch'
set -g @floax-change-path 'true'

# Persist and auto-restore tmux sessions across reboots.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'off'
# Restore nvim session (open buffers) if Session.vim is present in cwd.
set -g @resurrect-strategy-nvim 'session'
# Relaunch these processes on restore. "~" = loose match; "->cmd *" = rewrite.
set -g @resurrect-processes 'ssh "~nvim"'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'


# Disable the primary prefix so the setup stays menu-first. Keep a stock tmux
# prefix as a recovery path if the which-key layer misbehaves.
set -g prefix None
set -g prefix2 C-b

# ---- General ----
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
# Smart window names (see plugin section above for rationale).
setw -g automatic-rename on
setw -g allow-rename on
# When a session is destroyed, switch to another attached session instead of
# dropping the client to shell. Plays nicely with sesh/opensessions flows.
set -g detach-on-destroy off

# Pane border shows the running command per pane — but only when the window
# has more than one pane, so single-pane windows don't waste a row.
setw -g pane-border-status off
set -g pane-border-format "#{?window_zoomed_flag,[ ZOOM ] ,}#{pane_current_command} "
set -g pane-border-lines heavy          # thicker glyphs — inactive vs active reads clearer
set-hook -g window-layout-changed 'if -F "#{==:#{window_panes},1}" "setw pane-border-status off" "setw pane-border-status top"'

# Border colors (Catppuccin Latte): inactive = overlay0, active = blue, zoomed = yellow.
# Style is re-evaluated live, so this stays correct across window switches without hooks.
set -g pane-border-style        'fg=#9ca0b0'
set -g pane-active-border-style '#{?window_zoomed_flag,fg=#df8e1d bold,fg=#1e66f5 bold}'

# Highlight windows with background output; no bell/message.
setw -g monitor-activity on
set -g visual-activity off

# ---- Terminal capabilities ----
set -g default-terminal "tmux-256color"
# Ask the outer terminal for extended key reporting when it supports it.
# Keep terminal-specific feature hints in tmux.local.conf rather than here.
set -s  extended-keys on
set -g set-clipboard external
set -g focus-events on
# 50k lines of scrollback per pane (default is 2000).
set -g history-limit 50000
# Show session · window in the outer terminal title when supported.
set -g set-titles on
set -g set-titles-string '#S · #W'
# Allow escape sequences (inline images via imgcat, Kitty graphics, etc.)
# to pass through tmux only from visible panes.
set -g allow-passthrough on

# ---- UX timings & sizing ----
set -g display-time 2000         # messages stay readable (default 750ms)
set -g display-panes-time 2000   # pane-number overlay long enough to actually pick one
setw -g aggressive-resize on     # size windows to the smallest *viewing* client, not session

# ---- Catppuccin Latte: menu / popup / message / copy-mode styles ----
# Matches the status bar and pane borders so modal UI stops jarring.
set -g menu-style            'fg=#4c4f69,bg=#eff1f5'
set -g menu-selected-style   'fg=#eff1f5,bg=#1e66f5,bold'
set -g menu-border-style     'fg=#9ca0b0'
set -g popup-style           'bg=#eff1f5'
set -g popup-border-style    'fg=#1e66f5'
set -g popup-border-lines    heavy
set -g message-style         'fg=#eff1f5,bg=#1e66f5'
set -g message-command-style 'fg=#eff1f5,bg=#1e66f5'
set -g mode-style            'fg=#eff1f5,bg=#1e66f5'

# Prefix bindings are routed through tmux-which-key (see config.yaml).
# Copy-mode bindings remain below since they use the copy-mode-vi table.

# ---- Wheel: remap to j/k for TUIs that capture mouse but ignore wheel ----
bind -n WheelUpPane   if -F '#{==:#{pane_current_command},claude-esp-rs}' 'send-keys -N 3 k' 'if -Ft= "#{mouse_any_flag}" "send-keys -M" "if -Ft= \"#{pane_in_mode}\" \"send-keys -M\" \"copy-mode -et=\""'
bind -n WheelDownPane if -F '#{==:#{pane_current_command},claude-esp-rs}' 'send-keys -N 3 j' 'send-keys -M'

# ---- Vi copy-mode ----
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/.config/tmux/bin/copy.sh"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "$HOME/.config/tmux/bin/copy.sh"

# Tell TPM to install into the XDG plugins dir (matches where plugins already live).
setenv -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# Keep this at the very bottom
run '~/.config/tmux/plugins/tpm/tpm'

# Recovery-only: keep one explicit reload binding on the backup prefix.
bind -T prefix R run-shell "#{@config_dir}/bin/reload-config.sh"

# Some terminals send NUL (C-@) for Ctrl-Space. Alias it to the root menu.
bind -T root 'C-@' show-wk-menu-root

# ---- Status bar (catppuccin modules) ----
# MUST be after `run tpm` so catppuccin's plugin init doesn't clobber.
# Custom modal flags module (sync panes, mouse off, zoom).
source-file -F "#{@config_dir}/flags.conf"
# Custom RAM module (tmux-cpu supplies #{ram_percentage}).
source-file -F "#{@config_dir}/ram.conf"

set -g status-position top
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 120
set -g status-left  '#{E:@catppuccin_status_session}'
set -g status-right '#{?pane_synchronized,#{E:@catppuccin_status_flags},#{?mouse,#{?window_zoomed_flag,#{E:@catppuccin_status_flags},},#{E:@catppuccin_status_flags}}}'
set -ag status-right '#{E:@catppuccin_status_ram}'

# Optional machine- or terminal-specific overrides live here.
source-file -q "#{@config_dir}/tmux.local.conf"
